<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Realtime Voice AI</title>
  <style>
body {
  background: #0f172a;
  color: white;
  font-family: Arial, sans-serif;
  margin: 0;
}

.container {
  max-width: 800px;
  margin: 40px auto;
  padding: 24px;
}

button {
  padding: 16px 30px;
  background: #06b6d4;
  border: none;
  color: white;
  border-radius: 12px;
  font-size: 18px;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

#messages {
  margin-top: 30px;
  white-space: pre-wrap;
  background: #111827;
  padding: 16px;
  border-radius: 12px;
  min-height: 200px;
}
</style>
</head>
<body>
  <div class="container">
    <h1>🎙️ Realtime Voice AI</h1>
    <p>Speak for 4 seconds and get an AI voice response.</p>
    <button id="startBtn">Start Talking</button>
    <pre id="messages"></pre>
  </div>
  <script>
const ws = new WebSocket("wss://18c7-103-95-164-224.ngrok-free.app/ws");

const startBtn = document.getElementById("startBtn");
const messages = document.getElementById("messages");

let mediaRecorder;

function log(msg) {
  messages.textContent += msg + "\n";
  messages.scrollTop = messages.scrollHeight;
}

ws.onopen = () => log("Connected to backend.");
ws.onerror = () => log("WebSocket error.");

ws.onmessage = async (event) => {

  // Text messages
  if (typeof event.data === "string") {

    if (event.data.startsWith("AI_TOKEN:")) {
      const token = event.data.replace("AI_TOKEN:", "");
      messages.textContent += token;
    } else {
      log(event.data);
    }

  } else {

    // Audio response from backend
    const audioBlob = new Blob([event.data], {
      type: "audio/wav"
    });

    const url = URL.createObjectURL(audioBlob);

    const audio = new Audio(url);

    await audio.play();
  }
};

startBtn.onclick = async () => {

  const stream = await navigator.mediaDevices.getUserMedia({
    audio: true
  });

  mediaRecorder = new MediaRecorder(stream, {
    mimeType: "audio/webm;codecs=opus"
  });

  let chunks = [];

  mediaRecorder.ondataavailable = (e) => {
    chunks.push(e.data);
  };

  mediaRecorder.onstop = async () => {

    const blob = new Blob(chunks, {
      type: "audio/webm;codecs=opus"
    });

    chunks = [];

    const buffer = await blob.arrayBuffer();

    ws.send(buffer);

    log("\nListening complete. Processing...\n");
  };

  mediaRecorder.start();

  log("Recording for 4 seconds...");

  setTimeout(() => {
    mediaRecorder.stop();
    stream.getTracks().forEach(track => track.stop());
  }, 4000);
};
</script>
</body>
</html>
