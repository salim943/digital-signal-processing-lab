    <script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.plot.ly/plotly-3.5.1.min.js"></script>
<!-- MAIN SIMULATOR TOOL -->
    <section class="bg-white rounded-2xl shadow-xl p-6 md:p-10 mb-12 border border-gray-100">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Binary Bitstream:</label>
                    <input class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" id="bitInput" type="text" value="1,0,1,1,0,1,0,0" />
                    <p class="text-xs text-gray-500 mt-1">Comma-separated bits (e.g., 1,0,1,1)</p>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Modulation Order (M):</label>
                    <select id="modulationOrder" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                        <option value="4">4-QAM (QPSK)</option>
                        <option value="16" selected>16-QAM</option>
                        <option value="64">64-QAM</option>
                        <option value="256">256-QAM</option>
                    </select>
                </div>

                <button class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-lg transition transform hover:scale-[1.02]" id="generateModulatedBtn">
                    Update Constellation
                </button>
            </div>

            <div class="bg-gray-50 rounded-xl p-4 border border-gray-200">
                <h3 class="font-bold text-gray-800 mb-4 text-center">Constellation Diagram</h3>
                <div id="constellationPlot" style="height: 350px;"></div>
            </div>
        </div>
    </section>
